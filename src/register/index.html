<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauty Salon | Register</title>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div id="header-root"></div>

    <main class="container py-5 auth-page">
      <section class="auth-shell card border-0 shadow-sm p-4">
        <h1 class="h3 mb-3">Register</h1>
        <p class="text-muted mb-4">Create your account to book and manage appointments.</p>

        <div id="register-alert" class="alert d-none" role="alert"></div>

        <form id="register-form" novalidate>
          <div class="mb-3">
            <label class="form-label" for="register-email">Email</label>
            <input class="form-control" type="email" id="register-email" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="register-password">Password</label>
            <input class="form-control" type="password" id="register-password" required minlength="6" />
          </div>
          <button id="register-submit" class="btn btn-dark px-4" type="submit">Register</button>
        </form>

        <p class="mb-0 mt-3 text-muted">Already registered? <a href="/login/">Login</a>.</p>
      </section>
    </main>

    <div id="footer-root"></div>

    <script type="module" src="/pages/register/register.js"></script>
  </body>
</html>
