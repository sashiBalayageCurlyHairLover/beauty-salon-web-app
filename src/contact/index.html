<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauty Salon | Contact</title>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div id="header-root"></div>

    <main class="container py-5">
      <section class="card border-0 shadow-sm p-4">
        <h1 class="h3 mb-3">Contact</h1>
        <p class="text-muted mb-4">Reach us for booking questions, service details, or general support.</p>

        <div class="row g-4">
          <div class="col-lg-5">
            <h2 class="h5 mb-2">Salon Information</h2>
            <p class="mb-1"><strong>Address:</strong> 123 Beauty Avenue, City Center</p>
            <p class="mb-1"><strong>Phone:</strong> +1 (555) 123-4567</p>
            <p class="mb-0"><strong>Email:</strong> hello@beautysalon.demo</p>
          </div>

          <div class="col-lg-7">
            <div id="contact-alert" class="alert d-none" role="alert"></div>
            <form id="contact-form" novalidate>
              <div class="mb-3">
                <label class="form-label" for="contact-name">Name</label>
                <input id="contact-name" class="form-control" type="text" required />
              </div>

              <div class="mb-3">
                <label class="form-label" for="contact-email">Email</label>
                <input id="contact-email" class="form-control" type="email" required />
              </div>

              <div class="mb-3">
                <label class="form-label" for="contact-message">Message</label>
                <textarea id="contact-message" class="form-control" rows="4" required></textarea>
              </div>

              <button id="contact-submit" class="btn btn-dark" type="submit">Send Message</button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-root" class="mt-auto"></div>

    <script type="module" src="/pages/contact/contact.js"></script>
  </body>
</html>
