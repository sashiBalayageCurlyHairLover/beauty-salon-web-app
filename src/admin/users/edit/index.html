<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauty Salon | Admin Edit User</title>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div id="header-root"></div>

    <main class="container py-5">
      <section class="card border-0 shadow-sm p-4">
        <h1 class="h3 mb-3">Edit User</h1>
        <div id="admin-user-edit-alert" class="alert d-none" role="alert"></div>

        <form id="admin-user-edit-form" novalidate>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="admin-user-email">Email</label>
              <input id="admin-user-email" class="form-control" type="email" disabled />
            </div>

            <div class="col-md-6">
              <label class="form-label" for="admin-user-full-name">Full Name</label>
              <input id="admin-user-full-name" class="form-control" type="text" />
            </div>

            <div class="col-md-6">
              <label class="form-label" for="admin-user-phone">Phone</label>
              <input id="admin-user-phone" class="form-control" type="text" />
            </div>

            <div class="col-md-6">
              <label class="form-label" for="admin-user-role">Role</label>
              <select id="admin-user-role" class="form-select" required>
                <option value="client">Client</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>

          <div class="mt-3 d-flex gap-2">
            <button id="admin-user-edit-submit" class="btn btn-dark" type="submit">Save Changes</button>
            <a class="btn btn-outline-dark" href="/admin/users/">Cancel</a>
          </div>
        </form>
      </section>
    </main>

    <div id="footer-root" class="mt-auto"></div>

    <script type="module" src="/pages/admin/users/edit.js"></script>
  </body>
</html>
