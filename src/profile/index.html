<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauty Salon | Profile</title>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div id="header-root">
      <nav class="navbar navbar-expand-lg bg-white border-bottom header-nav" aria-label="Main navigation">
        <div class="container">
          <a class="navbar-brand fw-semibold" href="/">Beauty Salon</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
            aria-controls="mainNavbar"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
              <li class="nav-item"><a class="nav-link active" aria-current="page" href="/profile/">Profile</a></li>
              <li class="nav-item"><a class="nav-link" href="/register/">Register</a></li>
              <li class="nav-item"><a class="nav-link" href="/login/">Login</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </div>

    <main class="container py-5">
      <section class="card border-0 shadow-sm p-4 mb-4">
        <h1 class="display-6 mb-3">Profile</h1>
        <p class="lead text-muted mb-2">Signed in as:</p>
        <p id="profile-email" class="fs-5 mb-3">Loading...</p>
        <p class="mb-4">Your appointments: <strong id="appointments-count">0</strong></p>
        <div class="d-flex gap-2 flex-wrap">
          <button id="logout-btn" class="btn btn-dark" type="button">Logout</button>
          <a class="btn btn-outline-dark" href="/">Back to Home</a>
        </div>
      </section>

      <section class="card border-0 shadow-sm p-4 mb-4">
        <h2 class="h4 mb-3" id="appointment-form-title">Create Appointment</h2>
        <div id="appointment-alert" class="alert d-none" role="alert"></div>

        <form id="appointment-form" novalidate>
          <input id="appointment-id" type="hidden" />

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="appointment-date">Date</label>
              <input id="appointment-date" class="form-control" type="date" required />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="appointment-time">Time</label>
              <input id="appointment-time" class="form-control" type="time" required />
            </div>

            <div class="col-md-6">
              <label class="form-label" for="appointment-status">Status</label>
              <select id="appointment-status" class="form-select" required>
                <option value="pending">Pending</option>
                <option value="confirmed">Confirmed</option>
                <option value="cancelled">Cancelled</option>
                <option value="completed">Completed</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="appointment-service">Service (optional)</label>
              <select id="appointment-service" class="form-select">
                <option value="">None</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="appointment-staff">Staff (optional)</label>
              <select id="appointment-staff" class="form-select">
                <option value="">None</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label" for="appointment-notes">Notes</label>
              <textarea id="appointment-notes" class="form-control" rows="3"></textarea>
            </div>
          </div>

          <div class="mt-3 d-flex gap-2">
            <button id="appointment-submit" class="btn btn-dark" type="submit">Create Appointment</button>
            <button id="appointment-cancel-edit" class="btn btn-outline-secondary d-none" type="button">
              Cancel Edit
            </button>
          </div>
        </form>
      </section>

      <section class="card border-0 shadow-sm p-4">
        <h2 class="h4 mb-3">My Appointments</h2>
        <div id="appointments-list" class="d-grid gap-3"></div>
      </section>
    </main>

    <div id="footer-root" class="mt-auto">
      <footer class="border-top bg-white footer-shell">
        <div class="container py-2 d-flex justify-content-between align-items-center">
          <small class="text-muted mb-0">© 2026 Beauty Salon</small>
          <span class="text-muted d-inline-flex align-items-center gap-2">
            <i class="bi bi-stars"></i>
            Crafted with Vite
          </span>
        </div>
      </footer>
    </div>

    <script type="module" src="/pages/profile/profile.js"></script>
  </body>
</html>
