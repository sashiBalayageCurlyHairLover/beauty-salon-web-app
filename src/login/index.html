<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauty Salon | Login</title>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div id="header-root">
      <nav class="navbar navbar-expand-lg bg-white border-bottom header-nav" aria-label="Main navigation">
        <div class="container">
          <a class="navbar-brand fw-semibold" href="/">Beauty Salon</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
            aria-controls="mainNavbar"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
              <li class="nav-item"><a class="nav-link" href="/profile/">Profile</a></li>
              <li class="nav-item"><a class="nav-link" href="/register/">Register</a></li>
              <li class="nav-item"><a class="nav-link active" aria-current="page" href="/login/">Login</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </div>

    <main class="container py-5 auth-page">
      <section class="auth-shell card border-0 shadow-sm p-4">
        <h1 class="h3 mb-3">Login</h1>
        <p class="text-muted mb-4">Sign in to access your profile and appointments.</p>

        <div id="login-alert" class="alert d-none" role="alert"></div>

        <form id="login-form" novalidate>
          <div class="mb-3">
            <label class="form-label" for="login-email">Email</label>
            <input class="form-control" type="email" id="login-email" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="login-password">Password</label>
            <input class="form-control" type="password" id="login-password" required minlength="6" />
          </div>
          <button id="login-submit" class="btn btn-dark px-4" type="submit">Login</button>
        </form>

        <p class="mb-0 mt-3 text-muted">New here? <a href="/register/">Create an account</a>.</p>
      </section>
    </main>

    <div id="footer-root" class="mt-auto">
      <footer class="border-top bg-white footer-shell">
        <div class="container py-2 d-flex justify-content-between align-items-center">
          <small class="text-muted mb-0">© 2026 Beauty Salon</small>
          <span class="text-muted d-inline-flex align-items-center gap-2">
            <i class="bi bi-stars"></i>
            Crafted with Vite
          </span>
        </div>
      </footer>
    </div>

    <script type="module" src="/pages/login/login.js"></script>
  </body>
</html>
